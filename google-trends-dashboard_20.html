<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K-Beauty Trends</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f8f9fb; --surface: #fff; --border: #e8eaed;
  --text: #1a1a2e; --muted: #8a929e; --accent: #2563eb;
}
body { background: var(--bg); color: var(--text); font-family: 'Inter','Apple SD Gothic Neo',-apple-system,sans-serif; font-size: 13px; }

.top-nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 32px; display: flex; align-items: center; justify-content: space-between; }
.nav-tabs { display: flex; }
.nav-tab { padding: 16px 20px; font-size: 13px; font-weight: 500; cursor: pointer; border-bottom: 2px solid transparent; color: var(--muted); transition: all .15s; white-space: nowrap; }
.nav-tab:hover { color: var(--text); }
.nav-tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }
.nav-badge { font-size: 10px; font-weight: 700; letter-spacing: .8px; text-transform: uppercase; border: 1px solid var(--border); color: var(--muted); padding: 4px 10px; border-radius: 4px; }

.header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 32px 12px; }
.header h1 { font-size: 20px; font-weight: 700; letter-spacing: -.5px; }
.header p { font-size: 11px; color: var(--muted); margin-top: 3px; }

.filter-bar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 10px 32px; display: flex; align-items: flex-end; gap: 14px; flex-wrap: wrap; }
.ctrl { display: flex; flex-direction: column; gap: 3px; }
.ctrl label { font-size: 10px; color: var(--muted); font-weight: 500; letter-spacing: .4px; text-transform: uppercase; }
select, input[type=date] { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 6px 10px; border-radius: 6px; font-size: 12px; cursor: pointer; outline: none; }
select:focus, input[type=date]:focus { border-color: var(--accent); }
.date-row { display: flex; align-items: center; gap: 6px; }
.quick-btns { display: flex; gap: 4px; }
.qbtn { padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: 500; cursor: pointer; border: 1px solid var(--border); background: var(--surface); color: var(--muted); transition: all .15s; }
.qbtn:hover { border-color: var(--accent); color: var(--accent); }
.qbtn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.no-data-bar { display: none; font-size: 11px; color: #dc2626; background: #fef2f2; border: 1px solid #fecaca; padding: 6px 12px; border-radius: 6px; align-self: center; }

.group-tabs { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 32px; display: flex; overflow-x: auto; }
.gtab { padding: 10px 16px; font-size: 12px; font-weight: 500; cursor: pointer; border-bottom: 2px solid transparent; color: var(--muted); transition: all .15s; white-space: nowrap; }
.gtab:hover { color: var(--text); }
.gtab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }

.content { padding: 16px 32px; display: flex; flex-direction: column; gap: 12px; }

.section-label { font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 8px; }
.ranking-row { display: grid; grid-template-columns: repeat(5,1fr); gap: 8px; }
.rank-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; display: flex; align-items: center; gap: 10px; }
.rank-num { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: #fff; flex-shrink: 0; }
.rank-kw { font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.rank-pct { font-size: 13px; font-weight: 700; margin-top: 1px; }

.signal-box { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; }
.signal-title { font-size: 10px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px; }
.signal-item { font-size: 12px; color: #4a5568; line-height: 1.5; display: flex; gap: 8px; margin-bottom: 4px; }

.chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 18px 20px; }
.chart-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.chart-title-txt { font-size: 13px; font-weight: 600; }
.chart-dl { background: none; border: 1px solid var(--border); border-radius: 6px; padding: 4px 8px; cursor: pointer; color: var(--muted); font-size: 11px; }
.chips { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 12px; }
.chip { display: inline-flex; align-items: center; gap: 5px; padding: 3px 9px 3px 6px; border-radius: 20px; font-size: 11px; font-weight: 500; border: 1px solid var(--border); background: var(--surface); cursor: pointer; transition: all .12s; }
.chip-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.chip-toggle { font-size: 10px; font-weight: 600; border-color: var(--accent); color: var(--accent); }
.chart-wrap { position: relative; height: 320px; }

.state-msg { text-align: center; padding: 32px; color: var(--muted); font-size: 13px; grid-column: 1/-1; }
.state-msg strong { display: block; color: var(--text); margin-bottom: 4px; font-size: 14px; }
.footer { padding: 8px 32px 20px; font-size: 11px; color: var(--muted); }
</style>
</head>
<body>

<div class="top-nav">
  <div class="nav-tabs">
    <span class="nav-tab active" id="tab-skin" onclick="switchMode('skin')">🌿 Skin Concern</span>
    <span class="nav-tab" id="tab-ingredient" onclick="switchMode('ingredient')">🧪 Ingredient</span>
    <span class="nav-tab" id="tab-brand" onclick="switchMode('brand')">✨ Brand</span>
  </div>
  <span class="nav-badge">Google Trends · Scaled Index</span>
</div>

<div class="header">
  <h1 id="pageTitle">Skin Concern Trends</h1>
  <p id="subtitle">불러오는 중...</p>
</div>

<div class="filter-bar">
  <div class="ctrl">
    <label>지역</label>
    <select id="geoSel" onchange="onFilterChange()">
      <option value="GLOBAL">🌍 Global</option>
      <option value="US">🇺🇸 United States</option>
      <option value="CA">🇨🇦 Canada</option>
      <option value="IN">🇮🇳 India</option>
      <option value="PH">🇵🇭 Philippines</option>
      <option value="SG">🇸🇬 Singapore</option>
      <option value="MY">🇲🇾 Malaysia</option>
      <option value="AE">🇦🇪 UAE</option>
      <option value="SA">🇸🇦 Saudi Arabia</option>
      <option value="KR">🇰🇷 Korea</option>
      <option value="JP">🇯🇵 Japan</option>
    </select>
  </div>
  <div class="ctrl">
    <label>기간</label>
    <div class="date-row">
      <input type="date" id="dateFrom" onchange="onDateChange()">
      <span style="color:var(--muted)">→</span>
      <input type="date" id="dateTo" onchange="onDateChange()">
    </div>
  </div>
  <div class="quick-btns">
    <button class="qbtn" onclick="setQuick(13)">3개월</button>
    <button class="qbtn" onclick="setQuick(26)">6개월</button>
    <button class="qbtn active" id="btnAll" onclick="setQuick(0)">전체</button>
  </div>
  <div class="no-data-bar" id="noDataBar">⚠ 해당 지역 데이터 없음 — Colab에서 해당 GEO로 실행해주세요</div>
</div>

<div class="group-tabs" id="groupTabs"></div>

<div class="content">
  <div>
    <div class="section-label">선택 키워드 관심도 랭킹</div>
    <div class="ranking-row" id="rankingRow"><div class="state-msg"><strong>로딩 중...</strong></div></div>
  </div>
  <div class="signal-box">
    <div class="signal-title">주요 시그널</div>
    <div id="signalList"></div>
  </div>
  <div class="chart-card">
    <div class="chart-top">
      <span class="chart-title-txt" id="chartTitleTxt">관심도 추이</span>
      <button class="chart-dl" onclick="dlChart()">↓ 저장</button>
    </div>
    <div class="chips" id="chipsBox"></div>
    <div class="chart-wrap"><canvas id="mainChart"></canvas></div>
  </div>
</div>
<div class="footer" id="footer"></div>

<script>
var APPS_URL = "https://script.google.com/macros/s/AKfycbyXLZwYZodUR3EAvuFukPBBA3Z4YvzQHVETlAYCYW2f20TT-fHkFihzv-J-x4JLZFHA/exec";

var PALETTE = [
  "#2563eb","#10b981","#f59e0b","#8b5cf6","#ef4444",
  "#06b6d4","#f97316","#ec4899","#84cc16","#6366f1",
  "#14b8a6","#eab308","#a855f7","#22c55e","#fb923c",
  "#e11d48","#0ea5e9","#d946ef","#65a30d","#f43f5e",
  "#7c3aed","#0891b2","#dc2626","#16a34a","#ca8a04",
  "#4f46e5","#be185d","#0d9488"
];

var ID_COLS = {"date":1,"geo":1,"timeframe":1,"mode":1,"run_at":1};

var MODES = {
  skin: {
    title: "Skin Concern Trends",
    chartTitle: "관심도 추이 (Top 5 Selected Concerns)",
    fixed: null,
    groups: {
      "전체": null,
      "트러블·모공": ["acne","pimples","blackheads","large pores","oily skin"],
      "색소·톤": ["hyperpigmentation","dark spots","melasma","acne scars"],
      "노화·탄력": ["dull skin","wrinkles","fine lines","sagging skin","anti-aging"],
      "수분·장벽": ["dry skin","dehydrated skin","skin barrier"],
      "민감·진정": ["flaky skin","sensitive skin","redness","rosacea"],
      "피부질환·특이": ["eczema","dark circles","skin inflammation","fungal acne","seborrheic dermatitis","sun spots","stretch marks","milia"]
    }
  },
  ingredient: {
    title: "Ingredient Trends",
    chartTitle: "관심도 추이 (Top 5 Selected Ingredients)",
    fixed: null,
    groups: {
      "전체": null,
      "재생/노화방지": ["NMN","NAD","exosomes","PDRN","retinal"],
      "레티노이드·비타민": ["retinol","retinal","vitamin C serum","vitamin E","panthenol"],
      "미백·톤업": ["tranexamic acid","glutathione","azelaic acid","bakuchiol"],
      "장벽·진정": ["ceramides","ectoin","madecassoside","snail mucin"],
      "트러블·모공": ["hypochlorous acid","salicylic acid","glycolic acid","volufiline"],
      "기초·수분": ["hyaluronic acid","peptides","panthenol","micellar water"]
    }
  },
  brand: {
    title: "Brand Trends",
    chartTitle: "관심도 추이 (numbuzin + selected brands)",
    fixed: "numbuzin",
    groups: {"전체": null}
  }
};

var state = {
  mode: "skin",
  data: {},
  keywords: {},
  active: {},
  group: {}
};
var chartInst = null;

function switchMode(mode) {
  state.mode = mode;
  ["skin","ingredient","brand"].forEach(function(m) {
    document.getElementById("tab-"+m).className = "nav-tab" + (m===mode?" active":"");
  });
  document.getElementById("pageTitle").textContent = MODES[mode].title;
  document.getElementById("chartTitleTxt").textContent = MODES[mode].chartTitle;
  document.getElementById("chipsBox").innerHTML = "";
  document.getElementById("signalList").innerHTML = "";
  document.getElementById("rankingRow").innerHTML = "<div class='state-msg'><strong>로딩 중...</strong></div>";
  if (chartInst) { chartInst.destroy(); chartInst = null; }

  if (!state.data[mode]) {
    loadData(mode);
  } else {
    state.group[mode] = "전체";
    setTop5(mode);
    buildTabs(mode);
    render();
  }
}

function normalizeDate(v) {
  if (!v) return "";
  var s = String(v);
  if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  var d = new Date(s);
  return isNaN(d) ? s : d.toISOString().slice(0,10);
}

function loadData(mode) {
  fetch(APPS_URL + "?mode=" + mode)
    .then(function(r) { return r.json(); })
    .then(function(json) {
      if (json.error) throw new Error(json.error);
      var rows = json.map(function(r) {
        var out = {};
        Object.keys(r).forEach(function(k) { out[k] = r[k]; });
        out.date = normalizeDate(r.date);
        return out;
      }).filter(function(r) { return r.date; })
        .sort(function(a,b) { return a.date < b.date ? -1 : 1; });

      state.data[mode] = rows;
      state.keywords[mode] = Object.keys(rows[0]||{}).filter(function(k) { return !ID_COLS[k]; });
      state.group[mode] = "전체";

      if (mode === "skin") {
        var dates = rows.map(function(r) { return r.date; });
        document.getElementById("dateFrom").value = dates[0];
        document.getElementById("dateTo").value = dates[dates.length-1];
      }

      setTop5(mode);
      buildTabs(mode);
      render();
    })
    .catch(function(e) {
      document.getElementById("rankingRow").innerHTML =
        "<div class='state-msg'><strong>로드 실패</strong>" + e.message + "<br><small>Colab에서 먼저 데이터를 수집해주세요.</small></div>";
    });
}

function getFiltered() {
  var mode = state.mode;
  var geo = document.getElementById("geoSel").value;
  var from = document.getElementById("dateFrom").value;
  var to = document.getElementById("dateTo").value;
  return (state.data[mode]||[]).filter(function(r) {
    if ((r.geo||"GLOBAL") !== geo) return false;
    if (from && r.date < from) return false;
    if (to && r.date > to) return false;
    return true;
  });
}

function setTop5(mode) {
  var rows = getFiltered();
  var kws = state.keywords[mode]||[];
  var fixed = MODES[mode].fixed;
  if (!rows.length || !kws.length) { state.active[mode] = {}; return; }
  var avgs = {};
  kws.forEach(function(kw) {
    avgs[kw] = rows.reduce(function(s,r) { return s+(parseFloat(r[kw])||0); },0)/rows.length;
  });
  var sorted = kws.slice().sort(function(a,b) { return avgs[b]-avgs[a]; });
  var top5 = sorted.slice(0,5);
  if (fixed && top5.indexOf(fixed)<0) { top5 = [fixed].concat(top5.slice(0,4)); }
  var act = {};
  top5.forEach(function(k) { act[k]=1; });
  state.active[mode] = act;
}

function buildTabs(mode) {
  var box = document.getElementById("groupTabs");
  var groups = MODES[mode].groups;
  box.innerHTML = Object.keys(groups).map(function(g) {
    return "<span class='gtab" + (g==="전체"?" active":"") + "' onclick=\"selectGroup('" + g + "')\">" + g + "</span>";
  }).join("");
}

function selectGroup(g) {
  var mode = state.mode;
  state.group[mode] = g;
  var kwList = MODES[mode].groups[g];
  var kws = state.keywords[mode]||[];
  var fixed = MODES[mode].fixed;
  var groupKws = kwList ? kwList.filter(function(k) { return kws.indexOf(k)>=0; }) : kws;
  var rows = getFiltered();
  var avgs = {};
  groupKws.forEach(function(kw) {
    avgs[kw] = rows.reduce(function(s,r) { return s+(parseFloat(r[kw])||0); },0)/(rows.length||1);
  });
  var sorted = groupKws.slice().sort(function(a,b) { return avgs[b]-avgs[a]; });
  var top5 = sorted.slice(0,5);
  if (fixed && top5.indexOf(fixed)<0) { top5 = [fixed].concat(top5.slice(0,4)); }
  var act = {};
  top5.forEach(function(k) { act[k]=1; });
  state.active[mode] = act;
  document.querySelectorAll(".gtab").forEach(function(el) {
    el.className = "gtab" + (el.textContent===g?" active":"");
  });
  render();
}

function getScale(rows, kws) {
  var max = 0;
  kws.forEach(function(kw) {
    rows.forEach(function(r) { var v=parseFloat(r[kw])||0; if(v>max) max=v; });
  });
  return max>0 ? 100/max : 1;
}

function render() {
  var mode = state.mode;
  var rows = getFiltered();
  var kws = state.keywords[mode]||[];
  var act = state.active[mode]||{};
  var activeKws = kws.filter(function(k) { return act[k]; });

  document.getElementById("noDataBar").style.display = rows.length ? "none" : "flex";

  if (rows.length) {
    document.getElementById("subtitle").textContent = rows[0].date + " → " + rows[rows.length-1].date + " · " + document.getElementById("geoSel").value;
    document.getElementById("footer").textContent = "마지막 업데이트: " + (rows[rows.length-1].run_at||"-");
  }

  // Ranking
  var rankBox = document.getElementById("rankingRow");
  if (!rows.length) { rankBox.innerHTML = "<div class='state-msg'>데이터 없음</div>"; return; }

  var scale = getScale(rows, activeKws);
  var totals = {};
  activeKws.forEach(function(kw) {
    totals[kw] = rows.reduce(function(s,r) { return s+(parseFloat(r[kw])||0)*scale; },0)/rows.length;
  });
  var grand = activeKws.reduce(function(s,k) { return s+totals[k]; },0);
  var sorted = activeKws.map(function(kw) {
    return { kw:kw, pct: grand>0 ? Math.round(totals[kw]/grand*100) : 0 };
  }).sort(function(a,b) { return b.pct-a.pct; }).slice(0,5);

  rankBox.innerHTML = sorted.map(function(item, i) {
    var c = PALETTE[kws.indexOf(item.kw)%PALETTE.length];
    return "<div class='rank-card'>"
      + "<div class='rank-num' style='background:"+c+"'>"+(i+1)+"</div>"
      + "<div style='flex:1;min-width:0'>"
      + "<div class='rank-kw'>"+item.kw+"</div>"
      + "<div class='rank-pct' style='color:"+c+"'>"+item.pct+"%</div>"
      + "</div></div>";
  }).join("");

  // Signal
  var sigBox = document.getElementById("signalList");
  var signals = [];
  if (sorted.length>=2) {
    var t=sorted[0], s2=sorted[1];
    signals.push((t.pct-s2.pct)>20
      ? t.kw+"이 "+t.pct+"%로 1위, 2위 "+s2.kw+"("+s2.pct+"%)와 격차가 큼"
      : "1위 "+t.kw+"("+t.pct+"%)와 2위 "+s2.kw+"("+s2.pct+"%) 간 격차 좁음");
  }
  var troubleKws = ["acne","pimples","blackheads","oily skin","large pores"];
  var tc = sorted.filter(function(x) { return troubleKws.indexOf(x.kw)>=0; }).length;
  if (tc>=2) signals.push("Top 5 중 트러블·유분 관련 "+tc+"개 — 트러블 관심군 두드러짐");
  if (sorted.length>=3) {
    var last = sorted[sorted.length-1];
    signals.push(last.kw+"은 "+last.pct+"%로 "+sorted.length+"위 — 관심 추이 확인 필요");
  }
  sigBox.innerHTML = signals.slice(0,3).map(function(s) {
    return "<div class='signal-item'><span style='color:var(--muted)'>•</span><span>"+s+"</span></div>";
  }).join("");

  // Chips
  var chipsBox = document.getElementById("chipsBox");
  var allOn = activeKws.length === kws.length;
  var fixed = MODES[mode].fixed;
  var html = "<span class='chip chip-toggle' onclick='toggleAll()'>" + (allOn?"전체 해제":"전체 선택") + "</span>";
  kws.forEach(function(kw) {
    var c = PALETTE[kws.indexOf(kw)%PALETTE.length];
    var isOn = !!act[kw];
    var isFixed = kw===fixed;
    var style = isOn ? "background:"+c+"18;border-color:"+c+";color:"+c : "";
    var onclick = isFixed ? "" : "toggleKw('"+kw+"')";
    html += "<span class='chip' onclick=\""+onclick+"\" style=\""+style+"\">"
      + "<span class='chip-dot' style='background:"+(isOn?c:"#ccc")+"'></span>"
      + kw + (isFixed?" 📌":"") + "</span>";
  });
  chipsBox.innerHTML = html;

  // Chart
  if (chartInst) { chartInst.destroy(); chartInst = null; }
  var ctx = document.getElementById("mainChart").getContext("2d");
  chartInst = new Chart(ctx, {
    type: "line",
    data: {
      labels: rows.map(function(r) { return r.date; }),
      datasets: activeKws.map(function(kw) {
        var c = PALETTE[kws.indexOf(kw)%PALETTE.length];
        return {
          label: kw,
          data: rows.map(function(r) { return Math.round((parseFloat(r[kw])||0)*scale*10)/10; }),
          borderColor: c, backgroundColor: "transparent",
          borderWidth: kw===fixed?2.5:1.6,
          pointRadius: rows.length>26?0:2, pointHoverRadius:5, tension:0.4
        };
      })
    },
    options: {
      responsive:true, maintainAspectRatio:false,
      interaction:{mode:"index",intersect:false},
      plugins:{
        legend:{display:false},
        tooltip:{
          backgroundColor:"#fff", borderColor:"#e8eaed", borderWidth:1,
          titleColor:"#1a1a2e", bodyColor:"#6b7280", padding:10,
          itemSort:function(a,b){return b.parsed.y-a.parsed.y;},
          callbacks:{
            label:function(ctx){
              var ds=ctx.chart.data.datasets;
              var vals=ds.map(function(d){return{label:d.label,val:d.data[ctx.dataIndex]||0};}).sort(function(a,b){return b.val-a.val;});
              var rank=vals.findIndex(function(d){return d.label===ctx.dataset.label;})+1;
              return " "+rank+". "+ctx.dataset.label+": "+ctx.parsed.y.toFixed(1);
            },
            labelColor:function(ctx){return{borderColor:ctx.dataset.borderColor,backgroundColor:ctx.dataset.borderColor,borderRadius:2};},
            labelTextColor:function(ctx){return ctx.dataset.borderColor;}
          }
        }
      },
      scales:{
        x:{ticks:{color:"#8a929e",font:{size:10},maxTicksLimit:10},grid:{color:"#f1f3f5"}},
        y:{min:0,max:100,ticks:{color:"#8a929e",font:{size:10}},grid:{color:"#f1f3f5"},
           title:{display:true,text:"Scaled Index",color:"#8a929e",font:{size:10}}}
      }
    }
  });
}

function toggleAll() {
  var mode = state.mode;
  var kws = state.keywords[mode]||[];
  var act = state.active[mode]||{};
  var fixed = MODES[mode].fixed;
  var allOn = kws.filter(function(k){return act[k];}).length === kws.length;
  var newAct = {};
  if (allOn) {
    if (fixed) newAct[fixed] = 1;
  } else {
    kws.forEach(function(k) { newAct[k]=1; });
  }
  state.active[mode] = newAct;
  state.group[mode] = "전체";
  document.querySelectorAll(".gtab").forEach(function(el) {
    el.className = "gtab"+(el.textContent==="전체"?" active":"");
  });
  render();
}

function toggleKw(kw) {
  var mode = state.mode;
  var act = state.active[mode]||{};
  if (act[kw]) delete act[kw]; else act[kw]=1;
  state.active[mode] = act;
  render();
}

function setQuick(weeks) {
  var mode = state.mode;
  var rows = state.data[mode]||[];
  var dates = rows.map(function(r){return r.date;}).sort();
  if (!dates.length) return;
  var last = dates[dates.length-1];
  document.getElementById("dateTo").value = last;
  if (weeks===0) {
    document.getElementById("dateFrom").value = dates[0];
  } else {
    var d = new Date(last);
    d.setDate(d.getDate()-weeks*7);
    document.getElementById("dateFrom").value = d.toISOString().slice(0,10);
  }
  document.querySelectorAll(".qbtn").forEach(function(b){b.classList.remove("active");});
  if (weeks===0) document.getElementById("btnAll").classList.add("active");
  setTop5(mode);
  render();
}

function onFilterChange() { setTop5(state.mode); render(); }
function onDateChange() {
  document.querySelectorAll(".qbtn").forEach(function(b){b.classList.remove("active");});
  setTop5(state.mode);
  render();
}

function dlChart() {
  var a = document.createElement("a");
  a.href = document.getElementById("mainChart").toDataURL("image/png");
  a.download = state.mode+"-trends.png";
  a.click();
}

// 초기 로드
loadData("skin");
</script>
